name: CI

# Runs on every PR and on pushes to main. The single job is named "test" so it
# can be required by branch protection (the auto-merge gate).
#
# BOOTSTRAP MODE (STRICT="false"): tests still RUN and their results show in the
# logs, but a failing/erroring test does NOT fail CI — so auto-merge keeps working
# while a repo's test suite is incomplete or red. When this repo's tests are green
# and you want them enforced (block merges on failure), set STRICT to "true" below.

on:
  pull_request:
  push:
    branches: [ main ]

env:
  STRICT: "false"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        if: ${{ hashFiles('requirements.txt', 'pyproject.toml', 'setup.py') != '' }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Python tests
        if: ${{ hashFiles('requirements.txt', 'pyproject.toml', 'setup.py') != '' }}
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt || true; fi
          if [ -f pyproject.toml ]; then pip install -e . || true; fi
          pip install pytest
          if git ls-files | grep -qiE '(^|/)(test_[^/]*|[^/]*_test)\.py$|(^|/)tests?/'; then
            if pytest -q; then
              echo "pytest passed."
            elif [ "$STRICT" = "true" ]; then
              echo "::error::tests failed"; exit 1
            else
              echo "::warning::tests failed — not blocking (STRICT=false)"
            fi
          else
            echo "No Python tests found — passing."
          fi

      - name: Set up Node
        if: ${{ hashFiles('package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Node tests
        if: ${{ hashFiles('package.json') != '' }}
        run: |
          npm ci || npm install || true
          if [ "$STRICT" = "true" ]; then
            npm test --if-present
          else
            npm test --if-present || echo "::warning::tests failed — not blocking (STRICT=false)"
          fi

      - name: CI complete
        run: echo "CI complete (STRICT=$STRICT) for ${{ github.repository }}"
