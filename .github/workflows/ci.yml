name: CI

# Runs on every PR and on pushes to main. The single job is named "test" so it
# can be required by branch protection (the auto-merge gate). It auto-detects
# Python / Node projects and passes cleanly when a project has no tests yet.

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        if: ${{ hashFiles('requirements.txt', 'pyproject.toml', 'setup.py') != '' }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Python install & test
        if: ${{ hashFiles('requirements.txt', 'pyproject.toml', 'setup.py') != '' }}
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt || true; fi
          if [ -f pyproject.toml ]; then pip install -e . || true; fi
          pip install pytest
          if git ls-files | grep -qiE '(^|/)(test_[^/]*|[^/]*_test)\.py$|(^|/)tests?/'; then
            pytest -q
          else
            echo "No Python tests found — passing."
          fi

      - name: Set up Node
        if: ${{ hashFiles('package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Node install & test
        if: ${{ hashFiles('package.json') != '' }}
        run: |
          npm ci || npm install || true
          npm test --if-present

      - name: CI complete
        run: echo "CI complete for ${{ github.repository }} @ ${{ github.sha }}"
